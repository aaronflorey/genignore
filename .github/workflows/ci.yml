name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v8

      - name: Test
        run: go test ./...

  release-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.15.2
          args: check

      - name: Build release snapshot archives
        uses: goreleaser/goreleaser-action@v6
        with:
          version: v2.15.2
          args: release --snapshot --clean --skip=publish

      - name: Smoke test packaged Linux artifact
        shell: bash
        run: |
          set -euo pipefail

          archive=$(ls dist/genignore_*_linux_amd64.tar.gz)
          smoke_dir=$(mktemp -d)
          tar -xzf "$archive" -C "$smoke_dir"

          test -x "$smoke_dir/genignore"
          test -f "$smoke_dir/README.md"

          "$smoke_dir/genignore" list >"$smoke_dir/list.txt"
          "$smoke_dir/genignore" help >"$smoke_dir/help.txt"

          test -s "$smoke_dir/list.txt"
          test -s "$smoke_dir/help.txt"
