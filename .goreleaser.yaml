# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: genignore

builds:
  - id: genignore
    main: .
    binary: genignore
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  mode: keep-existing

brews:
  - name: genignore
    repository:
      owner: aaronflorey
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/aaronflorey/genignore"
    description: "Generate and maintain safe .gitignore blocks"
